<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-image: url("https://images.unsplash.com/photo-1551529834-525807d6b4f3?ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&q=80&w=1431");
        }
        h2{
            text-align: center;
            color:aliceblue;
            font-size: 50px;
        }
        button{
            text-align: center;
            margin-left: 47%;
            color:black;
            font-size: 20px;
        }
    </style>
</head>
<body>
  <h2>Food Menu</h2>
  <button id="addBtn">Add Item</button>

  <ul id="itemList"></ul>

  <script>
    console.log("external file loaded");
    const items = ["Biryani", "Mutton", "Chicken", "Paneer", "Fish"];
    let index = 0;
    const addBtn = document.getElementById("addBtn");
    const itemList = document.getElementById("itemList");
    addBtn.onclick = function() {
      if (index >= items.length) {
        alert("All items added!");
        return;
      }
      const li = document.createElement("li");
      li.textContent = items[index];
      const delBtn = document.createElement("button");
      delBtn.textContent = "Delete";
      delBtn.style.marginLeft = "10px";
      delBtn.onclick = function() {
        li.remove();
      };
      li.appendChild(delBtn);
      itemList.appendChild(li);
      index++;
    };
  </script>
</body>
</html>
