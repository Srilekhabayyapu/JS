<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
body {
  font-family: sans-serif;
  background: #f2f2f2;
  padding: 20px;
  display: flex;
  justify-content: center;
}

.todo-container {
  background: white;
  padding: 20px;
  border-radius: 8px;
  width: 100%;
  max-width: 500px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.input-group {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
}

#taskInput {
  flex: 1;
  padding: 8px;
  font-size: 16px;
  border: 1px solid #ccc;
  border-radius: 4px;
}

#addBtn {
  padding: 8px 16px;
  font-size: 16px;
  border: none;
  background: #007bff;
  color: white;
  border-radius: 4px;
  cursor: pointer;
}

#errorMsg {
  color: red;
  margin: 5px 0;
}

#todoList {
  list-style-type: none;
  padding: 0;
}

#todoList li {
  display: flex;
  align-items: center;
  padding: 8px;
  margin-bottom: 5px;
  border: 1px solid #ddd;
  border-radius: 4px;
  background: #fafafa;
}

#todoList li.completed span {
  text-decoration: line-through;
  color: #888;
}

.todo-btn {
  margin-left: auto;
  display: flex;
  gap: 5px;
}

.todo-btn button {
  cursor: pointer;
  border: none;
  background: none;
  font-size: 16px;
}
</style>
</head>
<body>
  <div class="todo-container">
    <h1>Todo App</h1>
    <div class="input-group">
      <input id="taskInput" type="text" placeholder="Enter task..." />
      <button id="addBtn">Add</button>
    </div>
    <p id="errorMsg" class="error"></p>
    <ul id="todoList"></ul>
    <p id="counter"></p>
  </div>
<script>
    // Get DOM elements
const taskInput = document.getElementById("taskInput");
const addBtn = document.getElementById("addBtn");
const todoList = document.getElementById("todoList");
const errorMsg = document.getElementById("errorMsg");
const counter = document.getElementById("counter");

// Load todos from localStorage or empty array
let todos = JSON.parse(localStorage.getItem("todos")) || [];

// Function to save todos to localStorage
function saveTodos() {
  localStorage.setItem("todos", JSON.stringify(todos));
}

// Function to render the list + counter
function renderTodos() {
  todoList.innerHTML = "";  // clear existing
  let remaining = 0;

  todos.forEach((todo, index) => {
    const li = document.createElement("li");
    if (todo.isCompleted) {
      li.classList.add("completed");
    }

    // Checkbox
    const checkbox = document.createElement("input");
    checkbox.type = "checkbox";
    checkbox.checked = todo.isCompleted;

    // Span or text / editable input placeholder
    const span = document.createElement("span");
    span.textContent = todo.text;

    // Button container
    const btnGroup = document.createElement("div");
    btnGroup.className = "todo-btn";

    // Edit / Save button
    const editBtn = document.createElement("button");
    editBtn.textContent = "✏️";

    // Delete button
    const delBtn = document.createElement("button");
    delBtn.textContent = "❌";

    btnGroup.appendChild(editBtn);
    btnGroup.appendChild(delBtn);

    li.appendChild(checkbox);
    li.appendChild(span);
    li.appendChild(btnGroup);
    todoList.appendChild(li);

    // If not completed, count as remaining
    if (!todo.isCompleted) remaining++;

    // Checkbox toggle complete/incomplete
    checkbox.addEventListener("change", () => {
      todo.isCompleted = checkbox.checked;
      saveTodos();
      renderTodos();
    });

    // Delete
    delBtn.addEventListener("click", () => {
      todos.splice(index, 1);
      saveTodos();
      renderTodos();
    });

    // Edit / Save
    editBtn.addEventListener("click", () => {
      if (editBtn.textContent === "✏️") {
        // switch to input mode
        const input = document.createElement("input");
        input.type = "text";
        input.value = todo.text;
        li.insertBefore(input, span);
        li.removeChild(span);
        editBtn.textContent = "💾";
      } else {
        // save
        const input = li.querySelector("input[type=text]");
        const newText = input.value.trim();
        if (!newText) {
          errorMsg.textContent = "Task cannot be empty";
          return;
        }
        errorMsg.textContent = "";
        todo.text = newText;
        saveTodos();
        renderTodos();
      }
    });
  });

  counter.textContent = `Tasks remaining: ${remaining}`;
}

// Add new todo
function addTodo() {
  const text = taskInput.value.trim();
  if (!text) {
    errorMsg.textContent = "Task cannot be empty";
    return;
  }
  errorMsg.textContent = "";

  todos.push({ text, isCompleted: false });
  saveTodos();
  renderTodos();
  taskInput.value = "";
}

// Event listeners
addBtn.addEventListener("click", addTodo);
taskInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    addTodo();
  }
});

// Initial render
renderTodos();

</script> 
</body>
</html>
